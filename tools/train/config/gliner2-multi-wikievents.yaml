# Fine-tune the pretrained fastino/gliner2-multi-v1 GLiNER2 model on WikiEvents.
# Uses from_pretrained (continues the model's existing heads); contrast with the
# mmbert-* configs, which bootstrap fresh heads on a raw encoder via from_encoder.
model:
  pretrained: fastino/gliner2-multi-v1
  # Optional: override the checkpoint's loss for continued training, e.g.
  # struct_loss: focal
  # focal_gamma: 2.0
  # focal_alpha: 0.25

training:
  output_dir: ./out/gliner2-multi-wikievents
  experiment_name: gliner2_multi_wikievents
  num_epochs: 3
  batch_size: 2
  gradient_accumulation_steps: 2
  encoder_lr: 1.0e-5         # lower LR than from-scratch: fine-tuning a trained model
  task_lr: 3.0e-4
  warmup_ratio: 0.05
  scheduler_type: cosine_restarts
  bf16: true
  fp16: false
  max_grad_norm: 1.0
  eval_strategy: epoch
  metric_for_best: eval_loss
  greater_is_better: false
  save_best: true
  save_total_limit: 3
  logging_steps: 10
  num_workers: 0
  validate_data: false
  max_len: 256               # mDeBERTa-v3 caps at 512 positions; leave room for the
                             # prepended schema + special tokens (a 512 chunk overflows)
  pin_memory: false
  sliding_window: true
  window_stride: 128

eval:
  batch_size: 8
  threshold: 0.5

labels:
  entities:
    rollup: true
    separator: "."
    map: {}          # e.g. {ORG: ORGANIZATION} to rename labels after roll-up
  relations:
    rollup: true
    separator: "."
    map: {}          # e.g. {ORG: ORGANIZATION} to rename labels after roll-up
  events:
    rollup: true
    separator: "."
    map: {}          # e.g. {ORG: ORGANIZATION} to rename labels after roll-up

data:
  corpora: []
  event_files:
    wikievents:
      train: data/wikievents.train.jsonl
      val: data/wikievents.dev.jsonl
      test: data/wikievents.test.jsonl
