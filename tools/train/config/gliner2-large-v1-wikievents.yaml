# Fine-tune the pretrained fastino/gliner2-multi-v1 GLiNER2 model on WikiEvents.
# Uses from_pretrained (continues the model's existing heads); contrast with the
# mmbert-* configs, which bootstrap fresh heads on a raw encoder via from_encoder.
model:
  pretrained: fastino/gliner2-large-v1
  # Optional: override the checkpoint's loss for continued training, e.g.
  # struct_loss: focal
  # focal_gamma: 2.0
  # focal_alpha: 0.25

training:
  checkpoint_restart: highest # hightest, last, or None
  output_dir: ./out/fastino/gliner2-large-v1-wikievents
  experiment_name: gliner2-large-v1_wikievents
  data_parallel: false
  num_epochs: 15
  batch_size: 2
  gradient_accumulation_steps: 16
  encoder_lr: 1.0e-5         # lower LR than from-scratch: fine-tuning a trained model
  task_lr: 3.0e-4
  warmup_ratio: 0.05
  scheduler_type: cosine_restarts
  bf16: true
  fp16: false
  max_grad_norm: 1.0
  eval_strategy: epoch
  metric_for_best: eval_event_strict_micro_f1
  greater_is_better: true
  save_best: true
  save_total_limit: 3
  logging_steps: 10
  num_workers: 0
  validate_data: false
  sliding_window: true
  max_len: 256               # deberta-v3-large caps at 512 positions; leave room for
  window_stride: 128                           # the prepended schema + special tokens (512 overflows)
  gradient_checkpointing: true
  pin_memory: false
  
  early_stopping: true        # Enable early stopping.
  early_stopping_patience: 3  # Patience for early stopping.


eval:
  batch_size: 1
  threshold: 0.5

labels:
  entities:
    rollup: false
    separator: "."
    map: {}          # e.g. {ORG: ORGANIZATION} to rename labels after roll-up
  relations:
    rollup: false
    separator: "."
    map: {}          # e.g. {ORG: ORGANIZATION} to rename labels after roll-up
  events:
    rollup: false
    separator: "."
    map: {}          # e.g. {ORG: ORGANIZATION} to rename labels after roll-up

data:
  corpora: []
  event_files:
    wikievents:
      train: data/wikievents.train.jsonl
      val: data/wikievents.dev.jsonl
      test: data/wikievents.test.jsonl
